<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dabble Rebound</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,400;0,500;0,700;0,800;0,900;1,900&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#23044A;
    font-family:'Rubik',sans-serif;
    display:flex; justify-content:center; align-items:center;
    min-height:100vh; overflow:hidden;
  }
  .game-wrap {
    width:100%; max-width:400px; min-height:100vh;
    background:#23044A;
    display:flex; flex-direction:column; align-items:center;
    padding:20px 16px 16px;
    position:relative; overflow:hidden;
  }
  .dabble-wordmark {
    font-family:'Rubik',sans-serif; font-weight:800;
    font-size:28px; color:#fff; letter-spacing:-0.5px; margin-bottom:2px;
  }
  .rebound-title { display:flex; align-items:center; margin-bottom:8px; }
  .rebound-text {
    font-family:'Rubik',sans-serif; font-weight:900;
    font-size:54px; color:#fff;
    letter-spacing:-1px; line-height:1; text-transform:uppercase;
  }
  .rebound-o {
    display:inline-flex; align-items:center; justify-content:center;
    width:54px; height:54px; border-radius:50%;
    border:3px solid #73FBD3; position:relative; margin:0 1px;
  }
  .rebound-o::before {
    content:''; position:absolute; inset:-7px; border-radius:50%;
    border:2.5px solid #73FBD3;
    border-bottom-color:transparent; border-left-color:transparent;
    transform:rotate(-40deg);
  }
  .rebound-o::after { content:'★'; font-size:22px; color:#7742FF; }
  .subtitle { font-size:13px; font-weight:700; color:#fff; text-align:center; margin-bottom:3px; }
  .subtitle-small {
    font-size:11px; font-weight:400; color:rgba(255,255,255,0.6);
    text-align:center; margin-bottom:10px; line-height:1.5; max-width:300px;
  }
  .subtitle.bomb-state { font-size:16px; font-weight:800; color:#fff; }
  .subtitle-small.bomb-state { color:rgba(255,255,255,0.65); font-size:12px; }
  .winnings {
    font-family:'Rubik',sans-serif; font-weight:900;
    font-size:68px; color:#fff;
    -webkit-text-stroke:4px #7742FF; paint-order:stroke fill;
    filter: drop-shadow(0px 4px 0px #4a1fa8) drop-shadow(0px 0px 20px rgba(119,66,255,0.4));
    letter-spacing:-1px; line-height:1; margin-bottom:10px; transition:transform 0.2s;
  }
  .winnings.bump { transform:scale(1.12); }
  .winnings.bomb-won {
    -webkit-text-stroke:4px #2ecc71;
    filter: drop-shadow(0px 4px 0px #1a7a42) drop-shadow(0px 0px 20px rgba(46,204,113,0.4));
  }
  .tracker {
    display:flex; flex-wrap:wrap; gap:5px;
    justify-content:center; margin-bottom:16px;
    width:100%; max-width:340px;
  }
  .tracker-pill {
    padding:7px 13px; border-radius:10px; font-size:13px; font-weight:700;
    color:rgba(255,255,255,0.75); border:1.5px solid rgba(255,255,255,0.12);
    background:#2a1660; transition:all 0.3s;
  }
  .tracker-pill.collected { background:#73FBD3; border-color:#73FBD3; color:#23044A; }
  .tracker-pill.bomb-pill { font-size:15px; background:#2a1660; }
  .tracker-pill.bomb-hit { background:#FF8080; border-color:#FF8080; }
  .grid {
    display:grid; grid-template-columns:repeat(3,1fr);
    gap:10px; width:100%; max-width:340px; margin-bottom:16px;
  }
  .tile {
    aspect-ratio:1; border-radius:16px; border:none; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    position:relative; overflow:hidden;
    transition:transform 0.12s, filter 0.12s;
    background:#7742FF; outline:none;
    box-shadow: inset 0 0 0 2px rgba(200,180,255,0.35), 0 4px 15px rgba(0,0,0,0.3);
  }
  .tile:hover:not(.revealed-cash):not(.revealed-bomb-hit):not(.revealed-bomb-other):not(.unrevealed-end) {
    transform:scale(1.05); filter:brightness(1.15);
  }
  .tile:active:not(.revealed-cash):not(.revealed-bomb-hit) { transform:scale(0.95); }
  .tile.revealed-cash { background:#2ecc71; cursor:default; }
  .tile.revealed-bomb-hit { background:#e74c3c; cursor:default; }
  .tile.revealed-bomb-other { background:#7a1a1a; cursor:default; }
  .tile.unrevealed-end { background:#2d5a3d; cursor:default; opacity:0.85; }
  .tile-val {
    font-family:'Rubik',sans-serif; font-style:italic;
    font-size:20px; font-weight:900; color:#fff;
    text-shadow:0 2px 8px rgba(0,0,0,0.3); letter-spacing:-0.5px;
  }
  .tile-val.dimmed { opacity:0.5; }
  .bomb-icon-big { font-size:42px; }
  .bomb-icon-sm  { font-size:32px; opacity:0.7; }
  .cashout-btn {
    width:100%; max-width:340px; padding:17px; border-radius:14px; border:none;
    background:#2ecc71; color:#fff;
    font-family:'Rubik',sans-serif; font-size:17px; font-weight:800;
    cursor:pointer; transition:filter 0.2s, transform 0.1s;
  }
  .cashout-btn:hover:not(:disabled) { filter:brightness(1.08); transform:scale(1.02); }
  .cashout-btn:active:not(:disabled) { transform:scale(0.98); }
  .cashout-btn:disabled {
    background:rgba(255,255,255,0.1); color:rgba(255,255,255,0.3); cursor:default;
  }
  .stake-selector { display:flex; align-items:center; gap:10px; margin-bottom:6px; }
  .stake-label { color:rgba(255,255,255,0.5); font-size:11px; font-weight:700; letter-spacing:1px; text-transform:uppercase; }
  .stake-select {
    background:rgba(119,66,255,0.3); border:1.5px solid rgba(119,66,255,0.6);
    color:#fff; padding:4px 10px; border-radius:8px;
    font-family:'Rubik',sans-serif; font-size:13px; font-weight:700;
    cursor:pointer; outline:none;
  }
  .stake-select option { background:#23044A; color:#fff; }
  .mute-btn {
    position:absolute; top:18px; right:16px;
    background:rgba(255,255,255,0.1); border:1.5px solid rgba(255,255,255,0.2);
    color:#fff; border-radius:50%; width:34px; height:34px;
    font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center;
    transition:background 0.2s;
  }
  .mute-btn:hover { background:rgba(255,255,255,0.2); }
  .overlay {
    position:absolute; inset:0; background:rgba(20,2,40,0.97);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    z-index:10; padding:30px; opacity:0; pointer-events:none; transition:opacity 0.4s;
  }
  .overlay.active { opacity:1; pointer-events:all; }
  .overlay-emoji { font-size:56px; margin-bottom:12px; }
  .overlay-title {
    font-family:'Rubik',sans-serif; font-size:28px; font-weight:900;
    color:#fff; text-align:center; margin-bottom:8px; text-transform:uppercase;
  }
  .overlay-sub {
    font-size:14px; font-weight:400; color:rgba(255,255,255,0.65);
    text-align:center; margin-bottom:20px; line-height:1.6; max-width:280px;
  }
  .overlay-amount {
    font-family:'Rubik',sans-serif; font-size:68px; font-weight:900;
    color:#fff; -webkit-text-stroke:3px #7742FF; paint-order:stroke fill; margin-bottom:28px;
  }
  .play-again-btn {
    padding:15px 44px; border-radius:14px; border:none;
    background:#73FBD3; color:#23044A;
    font-family:'Rubik',sans-serif; font-size:16px; font-weight:800;
    cursor:pointer; transition:filter 0.2s;
  }
  .play-again-btn:hover { filter:brightness(1.08); }
  .confetti-container { position:absolute; inset:0; pointer-events:none; overflow:hidden; z-index:11; }
  .confetto { position:absolute; opacity:0; border-radius:2px; animation:confettiFall linear forwards; }
  @keyframes confettiFall {
    0%  { transform:translateY(-20px) rotate(0deg); opacity:1; }
    100%{ transform:translateY(900px) rotate(720deg); opacity:0; }
  }
  @keyframes tileFlip {
    0%  { transform:scale(1) rotateY(0deg); }
    45% { transform:scale(0.82) rotateY(90deg); }
    100%{ transform:scale(1) rotateY(0deg); }
  }
  .tile.flipping { animation:tileFlip 0.32s ease forwards; }
  @keyframes shake {
    0%,100%{ transform:translateX(0); }
    20%{ transform:translateX(-8px) rotate(-3deg); }
    40%{ transform:translateX(8px) rotate(3deg); }
    60%{ transform:translateX(-6px) rotate(-2deg); }
    80%{ transform:translateX(6px) rotate(2deg); }
  }
  .tile.shake { animation:shake 0.45s ease; }
  .loading-screen {
    position:absolute; inset:0; background:#23044A;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    z-index:20; transition:opacity 0.5s;
  }
  .loading-screen.hidden { opacity:0; pointer-events:none; }
  .loading-icon { font-size:72px; margin-bottom:20px; animation:pulse 1.1s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
  .loading-text { color:#fff; font-size:15px; font-weight:600; margin-bottom:16px; }
  .spinner {
    width:26px; height:26px;
    border:3px solid rgba(255,255,255,0.15); border-top-color:#73FBD3;
    border-radius:50%; animation:spin 0.75s linear infinite;
  }
  @keyframes spin { to{ transform:rotate(360deg); } }
</style>
</head>
<body>
<div class="game-wrap" id="gameWrap">
  <div class="loading-screen" id="loadingScreen">
    <div class="loading-icon">👌💣</div>
    <div class="loading-text">Looking for parking...</div>
    <div class="spinner"></div>
  </div>
  <div class="confetti-container" id="confettiContainer"></div>
  <div class="overlay" id="winOverlay">
    <div class="overlay-emoji">🎉</div>
    <div class="overlay-title">You Cashed Out!</div>
    <div class="overlay-sub" id="winSubtext">You avoided the bombs and left with bonus cash — nice!</div>
    <div class="overlay-amount" id="winAmount">$0.00</div>
    <button class="play-again-btn" onclick="resetGame()">Play Again</button>
  </div>
  <button class="mute-btn" id="muteBtn" onclick="toggleMute()" title="Toggle sound">🔊</button>
  <div class="dabble-wordmark">dabble</div>
  <div class="rebound-title">
    <span class="rebound-text">REB</span>
    <div class="rebound-o"></div>
    <span class="rebound-text">UND</span>
  </div>
  <div class="stake-selector">
    <span class="stake-label">Trial Stake:</span>
    <select class="stake-select" id="stakeSelect" onchange="changeStake()">
      <option value="5">$5.00</option>
      <option value="10">$10.00</option>
      <option value="20">$20.00</option>
      <option value="50">$50.00</option>
    </select>
  </div>
  <div class="subtitle" id="mainSubtitle">Get back up to <span id="maxWinText">$7.50</span> in Bonus Cash</div>
  <div class="subtitle-small" id="mainSubSmall">Tap the tiles to reveal cash and build up your return.<br>Be sure to Take the Bonus Cash before hitting a 💣</div>
  <div class="winnings" id="winningsDisplay">$0.00</div>
  <div class="tracker" id="tracker"></div>
  <div class="grid" id="grid"></div>
  <button class="cashout-btn" id="cashoutBtn" onclick="cashOut()" disabled>Take the $0.00</button>
</div>
<script>
let audioCtx=null, muted=false, bgNode=null, bgGain=null, flipCount=0;
function getCtx(){ if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)(); return audioCtx; }
function toggleMute(){
  muted=!muted;
  document.getElementById('muteBtn').textContent=muted?'🔇':'🔊';
  if(bgGain) bgGain.gain.value=muted?0:0.06;
}
function playSwoosh(fi){
  if(muted) return;
  const ctx=getCtx(), t=ctx.currentTime, bp=200+fi*55;
  const bl=ctx.sampleRate*0.12, buf=ctx.createBuffer(1,bl,ctx.sampleRate), d=buf.getChannelData(0);
  for(let i=0;i<bl;i++) d[i]=(Math.random()*2-1)*(1-i/bl);
  const ns=ctx.createBufferSource(); ns.buffer=buf;
  const nf=ctx.createBiquadFilter(); nf.type='bandpass'; nf.frequency.setValueAtTime(bp*2,t); nf.frequency.exponentialRampToValueAtTime(bp*6,t+0.1); nf.Q.value=1.5;
  const ng=ctx.createGain(); ng.gain.setValueAtTime(0.18,t); ng.gain.exponentialRampToValueAtTime(0.001,t+0.12);
  ns.connect(nf); nf.connect(ng); ng.connect(ctx.destination); ns.start(t); ns.stop(t+0.13);
  const o=ctx.createOscillator(); o.type='sine'; o.frequency.setValueAtTime(bp,t); o.frequency.exponentialRampToValueAtTime(bp*3.5,t+0.08); o.frequency.exponentialRampToValueAtTime(bp*1.2,t+0.18);
  const og=ctx.createGain(); og.gain.setValueAtTime(0.22,t); og.gain.exponentialRampToValueAtTime(0.001,t+0.18);
  o.connect(og); og.connect(ctx.destination); o.start(t); o.stop(t+0.19);
}
function playCashDing(fi){
  if(muted) return;
  const ctx=getCtx(), t=ctx.currentTime;
  const notes=[523,659,784,880,988,1047,1175], freq=notes[Math.min(fi,notes.length-1)];
  [0,0.06,0.12].forEach((delay,i)=>{
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.type=i===2?'triangle':'square'; o.frequency.value=freq*(i===1?1.25:i===2?1.5:1);
    g.gain.setValueAtTime(0,t+delay); g.gain.linearRampToValueAtTime(0.18-i*0.04,t+delay+0.01); g.gain.exponentialRampToValueAtTime(0.001,t+delay+0.22);
    o.connect(g); g.connect(ctx.destination); o.start(t+delay); o.stop(t+delay+0.23);
  });
}
function playBoom(){
  if(muted) return;
  const ctx=getCtx(), t=ctx.currentTime;
  const bl=ctx.sampleRate*0.7, buf=ctx.createBuffer(1,bl,ctx.sampleRate), d=buf.getChannelData(0);
  for(let i=0;i<bl;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/bl,1.5);
  const src=ctx.createBufferSource(); src.buffer=buf;
  const lpf=ctx.createBiquadFilter(); lpf.type='lowpass'; lpf.frequency.value=180;
  const g=ctx.createGain(); g.gain.setValueAtTime(1.2,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.7);
  src.connect(lpf); lpf.connect(g); g.connect(ctx.destination); src.start(t); src.stop(t+0.71);
  const crack=ctx.createOscillator(); crack.type='sawtooth'; crack.frequency.setValueAtTime(80,t); crack.frequency.exponentialRampToValueAtTime(20,t+0.15);
  const cg=ctx.createGain(); cg.gain.setValueAtTime(0.6,t); cg.gain.exponentialRampToValueAtTime(0.001,t+0.15);
  crack.connect(cg); cg.connect(ctx.destination); crack.start(t); crack.stop(t+0.16);
}
function playFanfare(){
  if(muted) return;
  const ctx=getCtx(), t=ctx.currentTime;
  const melody=[523,659,784,1047,784,1047,1319], dur=[0.1,0.1,0.1,0.15,0.08,0.08,0.35];
  let time=t;
  melody.forEach((freq,i)=>{
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.type='square'; o.frequency.value=freq;
    g.gain.setValueAtTime(0.18,time); g.gain.exponentialRampToValueAtTime(0.001,time+dur[i]);
    o.connect(g); g.connect(ctx.destination); o.start(time); o.stop(time+dur[i]+0.01);
    time+=dur[i]*0.85;
  });
}
function startBgMusic(){
  if(muted) return;
  stopBgMusic();
  const ctx=getCtx();
  bgGain=ctx.createGain(); bgGain.gain.value=0.06; bgGain.connect(ctx.destination);
  const pattern=[130,155,174,196,220,196,174,155]; let step=0, bpm=90;
  function tick(){
    if(!bgNode) return;
    const interval=60/bpm, t=ctx.currentTime;
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.type='square'; o.frequency.value=pattern[step%pattern.length];
    g.gain.setValueAtTime(0.001,t); g.gain.linearRampToValueAtTime(1,t+0.01); g.gain.exponentialRampToValueAtTime(0.001,t+interval*0.7);
    o.connect(g); g.connect(bgGain); o.start(t); o.stop(t+interval*0.75);
    step++; bpm=90+flipCount*8;
    bgNode=setTimeout(tick,interval*900);
  }
  bgNode=setTimeout(tick,100);
}
function stopBgMusic(){ if(bgNode){ clearTimeout(bgNode); bgNode=null; } }
const BASE_VALS=[0.50,0.50,1.00,1.00,1.00,1.50,2.00];
const BOMB_COUNT=2;
let stake=5, board=[], currentWinnings=0, tilesRevealed=0, gameActive=false, bombHitIdx=-1;
function consolation(){ return +(stake*0.20).toFixed(2); }
function fmt(n){
  if(n<1) return `${Math.round(n*100)}¢`;
  if(Math.round(n*100)%100===0) return `$${Math.round(n)}`;
  return `$${n.toFixed(2)}`;
}
function fmtD(n){ return `$${n.toFixed(2)}`; }
function changeStake(){
  stake=parseFloat(document.getElementById('stakeSelect').value);
  document.getElementById('maxWinText').textContent=`$${(stake*1.5).toFixed(2)}`;
  resetGame();
}
function buildBoard(){
  const sc=stake/5;
  let tiles=[...BASE_VALS.map(v=>+(v*sc).toFixed(2)),'bomb','bomb'];
  for(let i=tiles.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [tiles[i],tiles[j]]=[tiles[j],tiles[i]]; }
  return tiles;
}
function buildTracker(){
  const sc=stake/5, el=document.getElementById('tracker');
  el.innerHTML='';
  BASE_VALS.map(v=>+(v*sc).toFixed(2)).forEach((v,i)=>{
    const p=document.createElement('div');
    p.className='tracker-pill'; p.id=`pill-c-${i}`;
    p.dataset.val=v; p.textContent=fmt(v);
    el.appendChild(p);
  });
  for(let i=0;i<BOMB_COUNT;i++){
    const p=document.createElement('div');
    p.className='tracker-pill bomb-pill'; p.id=`pill-b-${i}`;
    p.textContent='💣'; el.appendChild(p);
  }
}
function buildGrid(){
  const g=document.getElementById('grid'); g.innerHTML='';
  board.forEach((_,idx)=>{
    const t=document.createElement('button');
    t.className='tile'; t.id=`tile-${idx}`;
    t.onclick=()=>flipTile(idx);
    t.innerHTML=`<span style="font-size:38px;opacity:0.4;filter:grayscale(1) brightness(2);">👌</span>`;
    g.appendChild(t);
  });
}
function flipTile(idx){
  if(!gameActive) return;
  const t=document.getElementById(`tile-${idx}`);
  if(t.classList.contains('revealed-cash')||t.classList.contains('revealed-bomb-hit')||t.classList.contains('revealed-bomb-other')) return;
  if(flipCount===0) startBgMusic();
  playSwoosh(flipCount);
  t.classList.add('flipping');
  setTimeout(()=>{
    t.classList.remove('flipping');
    const val=board[idx];
    if(val==='bomb'){
      t.innerHTML='<span class="bomb-icon-big">💣</span>';
      t.classList.add('revealed-bomb-hit','shake');
      document.querySelectorAll('.tracker-pill.bomb-pill:not(.bomb-hit)')[0]?.classList.add('bomb-hit');
      bombHitIdx=idx; stopBgMusic();
      setTimeout(()=>playBoom(),80);
      handleBomb();
    } else {
      t.innerHTML=`<span class="tile-val">${fmt(val)}</span>`;
      t.classList.add('revealed-cash');
      currentWinnings=+(currentWinnings+val).toFixed(2);
      tilesRevealed++; flipCount++;
      markPill(val); updateWinnings();
      playCashDing(flipCount-1);
      if(tilesRevealed===BASE_VALS.length) setTimeout(()=>cashOut(),500);
    }
  },160);
}
function markPill(val){
  for(const p of document.querySelectorAll('.tracker-pill:not(.bomb-pill):not(.collected)')){
    if(+p.dataset.val===val){ p.classList.add('collected'); break; }
  }
}
function updateWinnings(){
  const el=document.getElementById('winningsDisplay');
  el.textContent=fmtD(currentWinnings);
  el.classList.add('bump'); setTimeout(()=>el.classList.remove('bump'),220);
  const btn=document.getElementById('cashoutBtn');
  btn.textContent=`Take the ${fmtD(currentWinnings)}`; btn.disabled=currentWinnings===0;
}
function handleBomb(){
  gameActive=false;
  const cons=consolation();
  board.forEach((val,idx)=>{
    const t=document.getElementById(`tile-${idx}`);
    if(idx===bombHitIdx) return;
    if(!t.classList.contains('revealed-cash')){
      if(val==='bomb'){ t.classList.add('revealed-bomb-other'); t.innerHTML='<span class="bomb-icon-sm">💣</span>'; }
      else { t.classList.add('unrevealed-end'); t.innerHTML=`<span class="tile-val dimmed">${fmt(val)}</span>`; }
      t.onclick=null; t.style.cursor='default';
    }
  });
  setTimeout(()=>{
    const sub=document.getElementById('mainSubtitle'), subSm=document.getElementById('mainSubSmall');
    sub.className='subtitle bomb-state'; sub.innerHTML='Oh no, you hit the Bomb!';
    subSm.className='subtitle-small bomb-state'; subSm.innerHTML=`Don't sweat it though, here's ${fmtD(cons)} in Bonus Cash back`;
    const win=document.getElementById('winningsDisplay');
    win.textContent=fmtD(cons); win.classList.add('bomb-won');
    const btn=document.getElementById('cashoutBtn');
    btn.textContent=`Take the ${fmtD(cons)}`; btn.disabled=false; btn.onclick=()=>bombCashOut(cons);
  },500);
}
function bombCashOut(cons){
  launchConfetti(); playFanfare();
  document.getElementById('winAmount').textContent=fmtD(cons);
  document.getElementById('winSubtext').textContent=`You hit a bomb but still walk away with ${fmtD(cons)} in Bonus Cash!`;
  setTimeout(()=>document.getElementById('winOverlay').classList.add('active'),400);
}
function cashOut(){
  if(!gameActive||currentWinnings===0) return;
  gameActive=false; stopBgMusic(); disableGrid();
  document.getElementById('cashoutBtn').disabled=true;
  revealRemaining();
  document.getElementById('winAmount').textContent=fmtD(currentWinnings);
  document.getElementById('winSubtext').textContent=`You avoided the 💣s and left with ${fmtD(currentWinnings)} in Bonus Cash — nice!`;
  launchConfetti(); playFanfare();
  setTimeout(()=>document.getElementById('winOverlay').classList.add('active'),700);
}
function revealRemaining(){
  board.forEach((val,idx)=>{
    const t=document.getElementById(`tile-${idx}`);
    if(!t.classList.contains('revealed-cash')&&!t.classList.contains('revealed-bomb-hit')){
      if(val==='bomb'){ t.classList.add('revealed-bomb-other'); t.innerHTML='<span class="bomb-icon-sm">💣</span>'; }
      else { t.classList.add('unrevealed-end'); t.innerHTML=`<span class="tile-val dimmed">${fmt(val)}</span>`; }
    }
  });
}
function disableGrid(){
  document.querySelectorAll('.tile').forEach(t=>{ t.onclick=null; t.style.cursor='default'; });
}
function launchConfetti(){
  const c=document.getElementById('confettiContainer');
  const cols=['#73FBD3','#FCFF4E','#FF8080','#7742FF','#fff','#2ecc71'];
  for(let i=0;i<90;i++){
    setTimeout(()=>{
      const el=document.createElement('div'); el.className='confetto';
      el.style.cssText=`left:${Math.random()*100}%;top:-20px;background:${cols[~~(Math.random()*cols.length)]};width:${8+Math.random()*8}px;height:${10+Math.random()*10}px;animation-duration:${1.5+Math.random()*2}s`;
      c.appendChild(el); setTimeout(()=>el.remove(),4000);
    },i*25);
  }
}
function resetGame(){
  document.getElementById('winOverlay').classList.remove('active');
  document.getElementById('confettiContainer').innerHTML='';
  stopBgMusic();
  currentWinnings=0; tilesRevealed=0; gameActive=true; bombHitIdx=-1; flipCount=0;
  board=buildBoard(); buildTracker(); buildGrid();
  const sub=document.getElementById('mainSubtitle');
  sub.className='subtitle'; sub.innerHTML=`Get back up to <span id="maxWinText">$${(stake*1.5).toFixed(2)}</span> in Bonus Cash`;
  document.getElementById('mainSubSmall').className='subtitle-small';
  document.getElementById('mainSubSmall').innerHTML='Tap the tiles to reveal cash and build up your return.<br>Be sure to Take the Bonus Cash before hitting a 💣';
  const win=document.getElementById('winningsDisplay'); win.textContent='$0.00'; win.className='winnings';
  const btn=document.getElementById('cashoutBtn'); btn.textContent='Take the $0.00'; btn.disabled=true; btn.onclick=()=>cashOut();
}
window.onload=()=>{
  board=buildBoard(); buildTracker(); buildGrid();
  setTimeout(()=>{ document.getElementById('loadingScreen').classList.add('hidden'); gameActive=true; },2000);
};
</script>
</body>
